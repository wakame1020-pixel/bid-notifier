<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>入札情報一覧（内装関連）</title>
<style>
  :root {
    --bg: #f7f7f5;
    --card-bg: #ffffff;
    --border: #e2e0da;
    --text: #24231f;
    --text-secondary: #6b6a63;
    --accent: #185fa5;
    --accent-bg: #e6f1fb;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1c1b18;
      --card-bg: #26251f;
      --border: #3a3931;
      --text: #f0efe9;
      --text-secondary: #a6a49a;
      --accent: #85b7eb;
      --accent-bg: #0c447c;
    }
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    padding: 2rem 1rem 4rem;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic", sans-serif;
    line-height: 1.6;
  }
  .container { max-width: 880px; margin: 0 auto; }
  h1 { font-size: 1.4rem; font-weight: 600; margin: 0 0 0.25rem; }
  .subtitle { color: var(--text-secondary); font-size: 0.9rem; margin: 0 0 1.5rem; }
  .controls {
    display: flex; gap: 8px; flex-wrap: wrap;
    margin-bottom: 1.5rem;
  }
  input[type="text"] {
    flex: 1; min-width: 200px;
    padding: 8px 12px;
    border: 1px solid var(--border);
    border-radius: 8px;
    background: var(--card-bg);
    color: var(--text);
    font-size: 0.95rem;
  }
  .pref-group {
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 12px;
    margin-bottom: 12px;
    overflow: hidden;
  }
  .pref-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 12px 16px;
    cursor: pointer;
    user-select: none;
  }
  .pref-header:hover { background: var(--accent-bg); }
  .pref-name { font-weight: 600; font-size: 1rem; }
  .pref-count {
    font-size: 0.8rem;
    color: var(--accent);
    background: var(--accent-bg);
    padding: 2px 10px;
    border-radius: 999px;
  }
  .pref-items { border-top: 1px solid var(--border); display: none; }
  .pref-items.open { display: block; }
  .item {
    padding: 12px 16px;
    border-bottom: 1px solid var(--border);
  }
  .item:last-child { border-bottom: none; }
  .item-title { font-weight: 500; margin: 0 0 4px; }
  .item-title a { color: var(--text); text-decoration: none; }
  .item-title a:hover { color: var(--accent); text-decoration: underline; }
  .item-meta { font-size: 0.82rem; color: var(--text-secondary); display: flex; gap: 12px; flex-wrap: wrap; }
  .empty { text-align: center; color: var(--text-secondary); padding: 3rem 1rem; }
  .updated { font-size: 0.78rem; color: var(--text-secondary); margin-top: 2rem; text-align: center; }
</style>
</head>
<body>
  <div class="container">
    <h1>入札情報一覧（内装関連・全国）</h1>
    <p class="subtitle">官公需情報ポータルサイトのデータをもとに、1日1回自動更新しています。</p>
    <div class="controls">
      <input type="text" id="search" placeholder="キーワードで絞り込み（案件名・発注機関など）">
    </div>
    <div id="list"></div>
    <p class="updated" id="updated"></p>
  </div>

<script>
async function main() {
  const listEl = document.getElementById('list');
  const searchEl = document.getElementById('search');
  const updatedEl = document.getElementById('updated');

  let records = [];
  try {
    const res = await fetch('bids_data.json?_=' + Date.now());
    records = await res.json();
  } catch (e) {
    listEl.innerHTML = '<p class="empty">データの読み込みに失敗しました。</p>';
    return;
  }

  function render(filterText) {
    const keyword = (filterText || '').trim().toLowerCase();
    const filtered = keyword
      ? records.filter(r =>
          (r.projectName || '').toLowerCase().includes(keyword) ||
          (r.orgName || '').toLowerCase().includes(keyword) ||
          (r.prefecture || '').toLowerCase().includes(keyword) ||
          (r.city || '').toLowerCase().includes(keyword))
      : records;

    if (filtered.length === 0) {
      listEl.innerHTML = '<p class="empty">該当する案件がありません。</p>';
      return;
    }

    const groups = {};
    for (const r of filtered) {
      const pref = r.prefecture || 'その他';
      if (!groups[pref]) groups[pref] = [];
      groups[pref].push(r);
    }

    const prefOrder = Object.keys(groups).sort((a, b) => groups[b].length - groups[a].length);

    listEl.innerHTML = prefOrder.map((pref, idx) => {
      const items = groups[pref];
      const itemsHtml = items.map(r => `
        <div class="item">
          <p class="item-title">${r.url ? `<a href="${escapeHtml(r.url)}" target="_blank" rel="noopener">${escapeHtml(r.projectName)}</a>` : escapeHtml(r.projectName)}</p>
          <div class="item-meta">
            <span>${escapeHtml(r.orgName)}</span>
            ${r.city ? `<span>${escapeHtml(r.city)}</span>` : ''}
            ${r.issueDate ? `<span>公告日: ${escapeHtml(r.issueDate)}</span>` : ''}
            ${r.deadline ? `<span>締切: ${escapeHtml(r.deadline)}</span>` : ''}
          </div>
        </div>
      `).join('');

      return `
        <div class="pref-group">
          <div class="pref-header" onclick="togglePref(${idx})">
            <span class="pref-name">${escapeHtml(pref)}</span>
            <span class="pref-count">${items.length}件</span>
          </div>
          <div class="pref-items" id="pref-${idx}">${itemsHtml}</div>
        </div>
      `;
    }).join('');
  }

  window.togglePref = function(idx) {
    const el = document.getElementById('pref-' + idx);
    el.classList.toggle('open');
  };

  function escapeHtml(s) {
    return (s || '').replace(/[&<>"']/g, c => ({
      '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
    })[c]);
  }

  searchEl.addEventListener('input', () => render(searchEl.value));
  render('');

  updatedEl.textContent = '案件データ ' + records.length + '件を表示中';
}

main();
</script>
</body>
</html>
